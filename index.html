<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nicola Sparks</title>

<meta name="description" content="Welcome to my secret corner of the internet ✨">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/simple-icons-font@v15/font/simple-icons.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#111111;
    color:white;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:40px 20px;
}

.container{
    width:100%;
    max-width:460px;
}

.hero{
    position:relative;
    overflow:hidden;
    border-radius:32px;
    margin-bottom:18px;
}

.hero img{
    width:100%;
    display:block;
    aspect-ratio:3/4;
    object-fit:cover;
}

.overlay{
    position:absolute;
    left:0;
    right:0;
    bottom:0;
    padding:28px;
    background:linear-gradient(
        to top,
        rgba(0,0,0,.85),
        rgba(0,0,0,.25),
        transparent
    );
}

.overlay h1{
    font-size:2rem;
    font-weight:700;
    margin-bottom:8px;
}

.overlay p{
    opacity:.9;
    line-height:1.4;
}

.button{
    width:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    text-decoration:none;
    color:white;

    background:#1d1a1d;

    border:1px solid rgba(255,255,255,.08);

    border-radius:24px;

    padding:20px;

    font-size:1.05rem;
    font-weight:600;

    margin-bottom:10px;

    transition:.2s ease;
}

.button:hover{
    transform:translateY(-2px);
}

    .button i{
    font-size:22px;
    margin-right:10px;
}
    
button.button{
    cursor:pointer;
    width:100%;
}

.primary{
    min-height:120px;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:1.25rem;
    font-weight:700;

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    position:relative;
    overflow:hidden;

    background-image:url("banner.png");

    border:0;
outline:none;
box-shadow:none;
}

.primary::before{
    content:"";

    position:absolute;
    inset:0;

    background:rgba(0,0,0,.30);

    z-index:1;
}

.primary span{
    position:relative;
    z-index:2;
}

.socials{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:12px;
}

.social{
    text-align:center;
    text-decoration:none;
    color:white;

    background:#1d1a1d;

    border:1px solid rgba(255,255,255,.08);

    border-radius:22px;

    padding:18px 10px;

    font-weight:600;

    transition:.2s ease;
}

.social:hover{
    transform:translateY(-2px);
}
    .social svg{
    width:22px;
    height:22px;
    fill:white;
}

@media(max-width:480px){

    body{
        padding:20px 16px;
    }

    .overlay h1{
        font-size:1.8rem;
    }

}
</style>
</head>

<body>

<div class="container">

    <div class="hero">

        <!-- ЗАМІНИ НА СВОЄ ФОТО -->

      var p2 = atob('YjE0LTQ1M2QtOWU0MS1hZDY4YjQzOTkxMmE=');

</html>
