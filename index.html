*{

    padding:0;
    box-sizing:border-box;
}

body{
    background:

            circle at top,
            rgba(255,182,193,.18),
            transparent 60%

.container{

.hero{

}

.hero img{
    width:100%;
    display:block;
    aspect-ratio:3/4;
    object-fit:cover;
}

.overlay{
    position:absolute;
    left:0;
    right:0;
    bottom:0;
    padding:28px;
    background:linear-gradient(
        to top,
        rgba(0,0,0,.85),

.overlay h1{
    font-size:2rem;
    font-weight:700;

}

.overlay p{
    opacity:.9;
    line-height:1.4;
}

.button{
    width:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    text-decoration:none;
    color:white;

    background:#1d1a1d;

    border:1px solid rgba(255,255,255,.08);

    border-radius:24px;

    padding:20px;

    font-size:1.05rem;
    font-weight:600;

    margin-bottom:12px;

    transition:.2s ease;
}

.button:hover{
    transform:translateY(-2px);
}

    .button i{

    margin-right:10px;
}

    .social i{

    color:white;
    width:24px;
    height:24px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
}
    
button.button{
    cursor:pointer;
    width:100%;

.primary{
    min-height:120px;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:1.25rem;
    font-weight:700;

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    position:relative;
    overflow:hidden;

    background-image:url("banner.png");

    border:0;
    outline:none;
    box-shadow:none;

    animation:glow 3s ease-in-out infinite;
    }

@keyframes glow{
    0%,100%{
        box-shadow:
            0 0 8px rgba(255,182,193,.12),
            0 0 18px rgba(255,182,193,.06);
    }

    50%{
        box-shadow:
            0 0 18px rgba(255,182,193,.22),
            0 0 40px rgba(255,182,193,.12);
    }
}

.primary::before{
    content:"";

    position:absolute;
    inset:0;

    background:rgba(0,0,0,.30);

    z-index:1;
}

.primary span{
    position:relative;
    z-index:3;
}

.socials{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:12px;
}

.social{
    text-align:center;
    text-decoration:none;
    color:white;

    background:#1d1a1d;

    border:1px solid rgba(255,255,255,.08);

    border-radius:22px;

    padding:18px 10px;

    font-weight:600;

    transition:.2s ease;

.social:hover{
    transform:translateY(-2px);
